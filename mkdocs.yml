site_name: by
theme:
  name: material
  logo: assets/logo-letter.svg
  favicon: assets/favicon.ico
  features:
    - navigation.path
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.sections
    - navigation.indexes
    - navigation.tracking
    - content.code.annotate
    - toc.follow
    - navigation.footer
    - navigation.top
    - content.code.copy
    - content.tabs.link
  palette:
    # https://squidfunk.github.io/mkdocs-material/setup/changing-the-colors/#automatic-light-dark-mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: astral-light
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: astral-dark
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  custom_dir: docs/.overrides
repo_url: https://github.com/KotlinIsland/basedpython-by
repo_name: by
site_author: KotlinIsland
site_url: https://todo.example.com/by
site_dir: site/by
site_description: by is an extremely fast Python type checker, built on basedpython.
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.snippets:
  - pymdownx.magiclink:
  - attr_list:
  - toc:
      anchorlink: true
      anchorlink_class: "toclink"
  - md_in_html:
  - pymdownx.inlinehilite:
  - pymdownx.superfences:
  - markdown.extensions.attr_list:
  - pymdownx.keys:
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
plugins:
  - search
  - git-revision-date-localized:
      timezone: UTC # It can only be in UTC unless the ISO time can include timezone.
  - llmstxt:
      markdown_description: |
        by is an extremely fast Python type checker and a language server written in Rust,
        built on basedpython. It can type check large Python codebases in seconds, providing
        fast feedback during development.

        by includes both a CLI (`by check`) and a language server (`by server`) for editor integration.

        When fetching documentation, use explicit `index.md` paths for directories, e.g.,
        `https://todo.example.com/by/features/index.md`. This returns clean markdown instead
        of rendered HTML with JS/CSS.
      sections:
        Guides:
          - installation.md
          - type-checking.md
          - editors.md
        Concepts:
          - configuration.md
          - modules.md
          - python-version.md
          - exclusions.md
          - rules.md
          - suppression.md
        Features:
          - features/type-system.md
          - features/diagnostics.md
          - features/language-server.md
        Reference:
          - reference/configuration.md
          - reference/typing-faq.md
          - reference/rules.md
          - reference/cli.md
          - reference/exit-codes.md
          - reference/environment.md
          - reference/editor-settings.md
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - js/extra.js
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/KotlinIsland/basedpython-by
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/basedpython/
nav:
  - Introduction: index.md
  - Guides:
      - Installation: installation.md
      - Type checking: type-checking.md
      - Editor integration: editors.md
  - Concepts:
      - Configuration: configuration.md
      - Module discovery: modules.md
      - Python version: python-version.md
      - File exclusions: exclusions.md
      - Rules: rules.md
      - Suppression: suppression.md
  - Features:
      - Type system: features/type-system.md
      - Diagnostics: features/diagnostics.md
      - Language server: features/language-server.md
  - Reference:
      - Configuration: reference/configuration.md
      - Typing FAQ: reference/typing-faq.md
      - Rules: reference/rules.md
      - CLI: reference/cli.md
      - Exit codes: reference/exit-codes.md
      - Environment variables: reference/environment.md
      - Editor settings: reference/editor-settings.md
validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
